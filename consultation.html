<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Consultation</title>
    <style>
        :root{--primary:#2563eb;--bg:#f8fafc;--card:#fff;--text:#1e293b;--border:#e2e8f0;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;color:var(--text);}
        .card{background:var(--card);width:100%;max-width:520px;padding:35px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08);}
        h2{text-align:center;margin-bottom:20px;font-size:22px;color:var(--primary);}
        .form-group{margin-bottom:18px;}
        label{display:block;margin-bottom:6px;font-weight:500;font-size:14px;}
        input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;transition:.3s;background:#fafbfc;}
        input:focus,select:focus,textarea:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff;}
        textarea{resize:vertical;min-height:90px;}
        .btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;}
        .btn:hover{background:#1d4ed8;}
        .back-link{display:block;text-align:center;margin-top:15px;color:#64748b;text-decoration:none;font-size:14px;}
        .back-link:hover{color:var(--primary);}
    </style>
</head>
<body>
    <div class="card">
        <h2>🩺 Request Consultation</h2>
        <form action="send_request.php" method="POST">
            <div class="form-group">
                <label for="doctor">Select Doctor</label>
                <select id="doctor" name="doctor_id" required>
                    <option value="" disabled selected>-- Choose a Doctor --</option>
                    <option value="1">Dr. Rahman (Cardiologist)</option>
                    <option value="2">Dr. Ahmed (Neurologist)</option>
                    <option value="3">Dr. Karim (Dermatologist)</option>
                    <option value="4">Dr. Hasan (Orthopedic)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Preferred Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="time">Preferred Time</label>
                <input type="time" id="time" name="time" required>
            </div>
            <div class="form-group">
                <label for="message">Problem Description</label>
                <textarea id="message" name="message" placeholder="Briefly describe your symptoms..." required></textarea>
            </div>
            <button type="submit" class="btn">📩 Send Request</button>
        </form>
        <a href="patient_dashboard.php" class="back-link">← Back to Dashboard</a>
    </div>
</body>
</html>
