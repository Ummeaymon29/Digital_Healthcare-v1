<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultation Request</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container card">
    <h2>Request Consultation</h2>
    <form action="/consultation/request" method="POST" id="consultForm">
      <div class="form-group">
        <label>Patient Name</label>
        <input type="text" name="patient_name" required placeholder="Auto-filled from session later">
      </div>
      <div class="form-group">
        <label>Doctor</label>
        <select name="doctor_id" required>
          <option value="">-- Select Doctor --</option>
          <option value="1">Dr. Rahman</option>
          <option value="2">Dr. Ahmed</option>
          <option value="3">Dr. Karim</option>
          <option value="4">Dr. Hasan</option>
          <option value="5">Dr. Chowdhury</option>
        </select>
      </div>
      <div class="form-group">
        <label>Problem Description</label>
        <textarea name="symptoms" rows="4" required placeholder="Describe your symptoms..."></textarea>
      </div>
      <button type="submit" class="btn btn-block">Send Request</button>
    </form>
    <a href="dashboard.html">← Back to Dashboard</a>
  </div>
</body>
</html>
