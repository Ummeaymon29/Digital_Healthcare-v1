<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Healthcare & Medicine Reminder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }

        .header h1 { font-size: 26px; margin-bottom: 8px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.9; }

        .form-container { padding: 35px 30px; }

        .form-group { margin-bottom: 22px; position: relative; }
        
        .form-group label {
            display: block; margin-bottom: 8px; color: #333; font-weight: 500; font-size: 14px;
        }

        .input-wrapper { position: relative; }
        .input-wrapper .icon {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 18px;
        }

        .form-group input {
            width: 100%; padding: 14px 15px 14px 45px; border: 2px solid #e1e1e1;
            border-radius: 10px; font-size: 15px; transition: all 0.3s ease; background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none; border-color: #667eea; background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .role-selection { display: flex; gap: 12px; margin-top: 10px; }
        .role-option { flex: 1; position: relative; }
        .role-option input[type="radio"] { position: absolute; opacity: 0; cursor: pointer; }

        .role-label {
            display: block; padding: 14px; text-align: center; background: #f8f9fa;
            border: 2px solid #e1e1e1; border-radius: 10px; cursor: pointer;
            transition: all 0.3s ease; font-weight: 500; font-size: 14px;
        }

        .role-option input[type="radio"]:checked + .role-label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-color: #667eea; transform: scale(1.02);
        }

        .login-btn {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }

        .register-link { text-align: center; margin-top: 25px; color: #666; font-size: 14px; }
        .register-link a {
            color: #667eea; text-decoration: none; font-weight: 600; transition: color 0.3s;
        }
        .register-link a:hover { color: #764ba2; text-decoration: underline; }

        @media (max-width: 480px) {
            .header h1 { font-size: 22px; }
            .form-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>🔐 Welcome Back</h1>
            <p>Login to Digital Healthcare & Medicine Reminder</p>
        </div>
        
        <div class="form-container">
            <form action="login.php" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="icon">📧</span>
                        <input type="email" name="email" placeholder="your.email@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Login as</label>
                    <div class="role-selection">
                        <div class="role-option">
                            <input type="radio" id="login-patient" name="role" value="Patient" checked>
                            <label for="login-patient" class="role-label">👨‍️ Patient</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="login-doctor" name="role" value="Doctor">
                            <label for="login-doctor" class="role-label">🩺 Doctor</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="login-btn"> Login to Account</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="register.html">✨ Register now</a>
            </div>
        </div>
    </div>

    <script>
        // Smooth focus effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.closest('.form-group').style.transform = 'scale(1.02)';
                this.closest('.form-group').style.transition = 'transform 0.2s ease';
            });
            input.addEventListener('blur', function() {
                this.closest('.form-group').style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
