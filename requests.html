                    <span class="icon">📅</span>
                    <input type="date" id="date" name="date" required min="<?php echo date('Y-m-d'); ?>">
                </div>
            </div>

            <div class="form-group">
                <label for="time">Preferred Time</label>
                <div class="input-wrapper">
                    <span class="icon">⏰</span>
                    <input type="time" id="time" name="time" required>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Problem Description</label>
                <textarea id="message" name="message" 
                    placeholder="Please describe your symptoms or reason for consultation..." 
                    required></textarea>
            </div>

            <button type="submit" class="btn">📩 Send Request</button>
        </form>

        <a href="patient_dashboard.php" class="back-link">← Back to Dashboard</a>

    <script>
        // Form validation & submission
        document.getElementById('consultationForm').addEventListener('submit', function(e) {
            const doctor = document.getElementById('doctor').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const message = document.getElementById('message').value.trim();
            const alertBox = document.getElementById('alertBox');

            // Client-side validation
            if(!doctor || !date || !time || !message) {
                e.preventDefault();
                alertBox.className = 'alert show alert-error';
                alertBox.textContent = 'Please fill in all fields!';
                return false;
            }

            // Check if date is not in the past
            const selectedDate = new Date(date);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            if(selectedDate < today) {
                e.preventDefault();
                alertBox.className = 'alert show alert-error';
                alertBox.textContent = 'Please select a future date!';
                return false;
            }

            // Show loading state
            const btn = document.querySelector('.btn');
            btn.textContent = '⏳ Sending Request...';
            btn.disabled = true;
        });

        // Auto-hide alert after 5 seconds
        setTimeout(() => {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('show');
        }, 5000);
    </script>
